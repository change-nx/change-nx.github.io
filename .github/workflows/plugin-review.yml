name: 插件自动审核

on:
  issues:
    types: [opened, labeled]
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 检查存活

jobs:

  # ── 1. 新 Issue 自动打标签 ──────────────────────────────
  auto-label:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title || '';
            if (!title.includes('[插件申请]')) return;
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: context.issue.number,
              labels: ['plugin-submit']
            });

  # ── 2. 校验 + 写入 ──────────────────────────────────────
  validate-and-add:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'plugin-submit'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: 校验并写入
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const body = context.payload.issue.body || '';
            const get  = k => {
              const m = body.match(new RegExp(`\\*\\*${k}：\\*\\*\\s*(.+)`));
              return m ? m[1].trim() : '';
            };

            const name   = get('插件昵称');
            const author = get('作者');
            const desc   = get('描述');
            const repo   = get('仓库地址');
            const tag    = get('标签');

            // ── 格式校验
            const errs = [];
            if (!name)                                   errs.push('- 插件昵称为空');
            if (!author)                                 errs.push('- 作者为空');
            if (!desc)                                   errs.push('- 描述为空');
            if (!['OneBot','QQ'].includes(tag))          errs.push('- 标签必须为 OneBot 或 QQ');

            // ── 仓库地址校验
            let repoPath = '';
            if (!repo || !/^https:\/\/github\.com\/.+\/.+/.test(repo)) {
              errs.push('- 仓库地址格式无效（需为 https://github.com/xxx/xxx）');
            } else {
              // 提取 owner/repo
              const match = repo.match(/^https:\/\/github\.com\/([^\/]+)\/([^\/\s]+)/);
              if (match) {
                repoPath = `${match[1]}/${match[2]}`;
                const repoName = match[2];

                // 检查仓库名必须以 Cucko_ 开头
                if (!repoName.startsWith('Cucko_')) {
                  errs.push('- 仓库名必须以 `Cucko_` 开头');
                } else {
                  // 检查仓库是否存在（不为404）
                  try {
                    await github.rest.repos.get({
                      owner: match[1],
                      repo:  repoName
                    });
                  } catch (e) {
                    if (e.status === 404) {
                      errs.push('- 仓库不存在或为私有仓库（返回 404）');
                    } else {
                      errs.push(`- 仓库检查失败（${e.status}），请确认仓库可公开访问`);
                    }
                  }
                }
              }
            }

            if (errs.length) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: `❌ **提交未通过，请修正以下问题后重新提交：**\n\n${errs.join('\n')}`
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
              return;
            }

            // ── 写入 plugins.json
            const path = 'PluginMarket/plugins.json';
            let list = [];
            if (fs.existsSync(path)) {
              list = JSON.parse(fs.readFileSync(path, 'utf8'));
            }

            // 防止重复（同仓库地址）
            if (list.find(p => p.repo === repo)) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: '⚠️ 该仓库已在插件市场中，无需重复提交。'
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
              return;
            }

            list.push({
              id:          context.payload.issue.number,
              name,
              author,
              description: desc,
              repo,
              tags:        [tag],
              added_at:    new Date().toISOString().slice(0, 10)
            });

            fs.mkdirSync('PluginMarket', { recursive: true });
            fs.writeFileSync(path, JSON.stringify(list, null, 2), 'utf8');

            core.exportVariable('ISSUE_NUM', String(context.payload.issue.number));
            core.exportVariable('PLUGIN_NAME', name);

      - name: 提交变更
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PluginMarket/plugins.json
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "plugin: add #${ISSUE_NUM} ${PLUGIN_NAME}"
          git push

      - name: 回复并关闭
        if: env.PLUGIN_NAME != ''
        uses: actions/github-script@v7
        with:
          script: |
            const num = parseInt(process.env.ISSUE_NUM);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: num,
              body: `🎉 **上架成功！** 你的插件 **${process.env.PLUGIN_NAME}** 已自动写入插件市场，页面将在几分钟内更新。`
            });
            await github.rest.issues.update({
              ...context.repo,
              issue_number: num,
              state: 'closed'
            });

  # ── 3. 定时检查存活 ─────────────────────────────────────
  daily-check:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: 检查所有插件仓库
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = 'PluginMarket/plugins.json';
            if (!fs.existsSync(path)) return;

            const list    = JSON.parse(fs.readFileSync(path, 'utf8'));
            const removed = [];
            const kept    = [];

            for (const p of list) {
              const match = (p.repo || '').match(/^https:\/\/github\.com\/([^\/]+)\/([^\/\s]+)/);
              if (!match) { removed.push(p); continue; }
              try {
                await github.rest.repos.get({ owner: match[1], repo: match[2] });
                kept.push(p);
              } catch (e) {
                if (e.status === 404) {
                  console.log(`移除 404 插件: ${p.name} (${p.repo})`);
                  removed.push(p);
                } else {
                  // 其他错误（网络等）保留，避免误删
                  kept.push(p);
                }
              }
            }

            if (removed.length === 0) {
              console.log('所有插件仓库均正常');
              return;
            }

            fs.writeFileSync(path, JSON.stringify(kept, null, 2), 'utf8');
            core.exportVariable('REMOVED_COUNT', String(removed.length));
            core.exportVariable('REMOVED_NAMES', removed.map(p=>p.name).join(', '));

      - name: 提交变更
        if: env.REMOVED_COUNT != '' && env.REMOVED_COUNT != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PluginMarket/plugins.json
          git diff --cached --quiet && exit 0
          git commit -m "plugin: daily cleanup, removed ${REMOVED_COUNT} plugin(s): ${REMOVED_NAMES}"
          git push