name: 插件审核

on:
  issues:
    types: [labeled]

jobs:
  approve:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: 写入 plugins.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const body = context.payload.issue.body || '';
            const get  = k => { const m = body.match(new RegExp(`\\*\\*${k}：\\*\\*\\s*(.+)`)); return m?m[1].trim():''; };
            const p = {
              id: context.payload.issue.number,
              name: get('插件昵称'), author: get('作者'),
              description: get('描述'), repo: get('仓库地址'),
              tags: [get('标签')].filter(Boolean),
              approved_at: new Date().toISOString().slice(0,10)
            };
            if (!p.name||!p.repo) { core.setFailed('字段不完整'); return; }
            const path = 'PluginMarket/plugins.json';
            let list = [];
            if (fs.existsSync(path)) list = JSON.parse(fs.readFileSync(path,'utf8'));
            if (list.find(x => x.id === p.id)) return;
            list.push(p);
            fs.mkdirSync('PluginMarket', { recursive: true });
            fs.writeFileSync(path, JSON.stringify(list, null, 2));

      - name: 提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PluginMarket/plugins.json
          git diff --cached --quiet || git commit -m "plugin: add #${{ github.event.issue.number }}"
          git push

      - name: 回复并关闭
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number,
              body: '🎉 审核通过！插件已上架，页面将在几分钟内更新。'
            });
            await github.rest.issues.update({ ...context.repo, issue_number: context.issue.number, state: 'closed' });

  reject:
    if: github.event.label.name == 'rejected'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number,
              body: '❌ 审核未通过，请检查仓库是否可访问、信息是否完整，修改后可重新申请。'
            });
            await github.rest.issues.update({ ...context.repo, issue_number: context.issue.number, state: 'closed' });

  validate:
    if: github.event.label.name == 'plugin-submit'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const get  = k => { const m = body.match(new RegExp(`\\*\\*${k}：\\*\\*\\s*(.+)`)); return m?m[1].trim():''; };
            const errs = [];
            if (!get('插件昵称'))                        errs.push('- 插件昵称为空');
            if (!get('作者'))                            errs.push('- 作者为空');
            if (!get('描述'))                            errs.push('- 描述为空');
            if (!/^https?:\/\/.+/.test(get('仓库地址'))) errs.push('- 仓库地址无效');
            if (!['OneBot','QQ'].includes(get('标签')))  errs.push('- 标签必须为 OneBot 或 QQ');
            const msg = errs.length
              ? `⚠️ 格式校验失败，请修正后重新提交：\n\n${errs.join('\n')}`
              : '✅ 格式校验通过，等待管理员审核（1-3 个工作日）。';
            await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body: msg });